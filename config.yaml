schedule:
  hour: 9
  minute: 0
  timezone: Europe/Berlin

searches:
  - make: BMW
    model: "x1"
    price_min_eur: null
    price_max_eur: 18500
    year_min: 2014
    year_max: null
    mileage_max_km: 150000
    # Exact URL slugs — copy from the site's URL bar when you do a manual search.
    autoscout_make_slug: bmw
    autoscout_model_slug: "x1"
    mobilede_make_id: BMW
    mobilede_model_id: X1
  - make: Porsche
    model: Cayenne
    price_max_eur: 19500
    year_min: 2010
    mileage_max_km: 170000
    autoscout_make_slug: porsche
    autoscout_model_slug: cayenne
  - make: Porsche
    model: Macan
    price_max_eur: 19500
    year_min: 2010
    mileage_max_km: 170000
    autoscout_make_slug: porsche
    autoscout_model_slug: macan
  - make: BMW
    model: "x3"
    price_max_eur: 18500
    year_min: 2014
    mileage_max_km: 150000
    autoscout_make_slug: BMW
    autoscout_model_slug: X3

sources:
  mobile_de:
    enabled: false        # disabled: mobile.de blocks plain HTTP (needs curl_cffi)
    max_pages: 5
  autoscout:
    enabled: true
    max_pages: 5          # 20 results/page → up to 100 listings
    country_code: D       # D=Germany, A=Austria, CH=Switzerland

ranking:
  top_n: 15
  strategy: best_deal     # best_deal | cheapest_first | newest_first | lowest_price_per_km
  min_deal_score: 5       # only show listings ≥5% below expected price (null = show all)
  exclude_keywords:        # titles containing these words are filtered out
    - touring
    - touri

notification:
  whatsapp:
    enabled: true
  telegram:
    enabled: true
