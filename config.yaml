schedule:
  hour: 9
  minute: 0
  timezone: Europe/Berlin

search:
  country: DE
  price_min_eur: null
  price_max_eur: 6500
  year_min: 2011
  year_max: null
  mileage_max_km: 190000
  make: BMW
  model: "3 Series"

  # Exact URL slugs — these must match what each site uses in its URL.
  # Tip: search on the site manually and copy the slug from the URL bar.
  autoscout_make_slug: bmw
  autoscout_model_slug: "3-series-(all)"
  mobilede_make_id: BMW
  mobilede_model_id: 3ER

sources:
  mobile_de:
    enabled: false        # disabled: mobile.de blocks plain HTTP (needs curl_cffi)
    max_pages: 5
  autoscout:
    enabled: true
    max_pages: 5          # 20 results/page → up to 100 listings
    country_code: D       # D=Germany, A=Austria, CH=Switzerland

ranking:
  top_n: 15
  strategy: best_deal     # best_deal | cheapest_first | newest_first | lowest_price_per_km
  min_deal_score: 5       # only show listings ≥5% below expected price (null = show all)
  exclude_keywords:        # titles containing these words are filtered out
    - touring
    - touri

notification:
  telegram:
    enabled: true
