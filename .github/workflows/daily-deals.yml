name: Daily Car Deals

on:
  schedule:
    # Runs every day at 07:00 UTC (= 09:00 Berlin time in summer, 08:00 in winter)
    # Adjust if needed: https://crontab.guru
    - cron: "0 7 * * *"

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  send-deals:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m car_deal_bot run-once
