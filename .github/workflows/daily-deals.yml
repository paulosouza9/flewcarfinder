name: Daily Car Deals

on:
  schedule:
    # Runs every day at 07:00 UTC (= 09:00 Berlin time in summer, 08:00 in winter)
    # Adjust if needed: https://crontab.guru
    - cron: "0 7 * * *"

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  send-deals:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore seen_deals.json from the previous run so we don't re-send deals
      - name: Restore memory
        uses: actions/cache/restore@v4
        with:
          path: seen_deals.json
          key: seen-deals

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m car_deal_bot run-once

      # Save the updated memory for the next run.
      # delete + save because actions/cache is immutable per key.
      - name: Save memory
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_deals.json
          key: seen-deals-${{ github.run_id }}

      # Also keep the stable restore key pointing at latest
      - name: Update restore key
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_deals.json
          key: seen-deals
        continue-on-error: true
